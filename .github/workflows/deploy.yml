name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  GAR_REPO: ${{ secrets.GAR_REPO }}
  SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE }}
  IMAGE_NAME: churn-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}" \
            --push \
            .

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            ENVIRONMENT=prod
          secrets: |
            OPENAI_API_KEY=OPENAI_API_KEY:latest

      - name: Smoke test health
        run: |
          curl --fail "${{ steps.deploy.outputs.url }}/health"

      - name: Smoke test predict
        run: |
          RESPONSE=$(curl --silent --show-error --fail \
            -X POST "${{ steps.deploy.outputs.url }}/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "gender": "Female",
              "Partner": "No",
              "Dependents": "No",
              "PhoneService": "Yes",
              "MultipleLines": "No",
              "InternetService": "Fiber optic",
              "OnlineSecurity": "No",
              "OnlineBackup": "No",
              "DeviceProtection": "No",
              "TechSupport": "No",
              "StreamingTV": "Yes",
              "StreamingMovies": "Yes",
              "Contract": "Month-to-month",
              "PaperlessBilling": "Yes",
              "PaymentMethod": "Electronic check",
              "tenure": 1,
              "MonthlyCharges": 85.0,
              "TotalCharges": 85.0
            }')

          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"prediction"'